# Sovereign Portal — single-command local stack
#
# Boots the portal shell + three foundation modules (Users, Customers,
# Workspaces) — backend and frontend each — plus MongoDB. Total: 8 services.
# Ready in ~90 seconds on a warm cache.
#
# Layout: this compose file builds each service from a sibling repo clone.
# Run the bundled clone helper first, or clone the seven component repos
# yourself into the same parent directory as this one:
#
#   parent-dir/
#   ├── freshify-sovereign-portal/   (this repo — contains docker-compose.yml)
#   ├── freshify-portal-shell/
#   ├── freshify-users/
#   ├── freshify-users-fe/
#   ├── freshify-companies/
#   ├── freshify-companies-fe/
#   ├── freshify-workspaces/
#   └── freshify-workspaces-fe/
#
# Usage:
#   git clone https://github.com/freshifyv2/freshify-sovereign-portal.git
#   cd freshify-sovereign-portal
#   ./scripts/clone-all.sh         # clones the seven sibling repos
#   cp .env.example .env
#   docker compose up --build
#
# Then open http://localhost:3000.
#
# Default operator credentials (printed by users-be on first boot):
#   email:    operator@sovereign.local
#   password: sovereign-portal-admin
#
# Reset everything (drop database, rebuild images):
#   docker compose down -v && docker compose up --build

services:
  # ---------- shared infrastructure ----------

  mongo:
    image: mongo:7
    container_name: portal-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s

  # ---------- foundation: Users module ----------

  users-be:
    build:
      context: ../freshify-users
      dockerfile: Dockerfile
    container_name: portal-users-be
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 8080
      LOG_LEVEL: info
      MONGODB_URI: mongodb://mongo:27017/freshify_users
      JWT_SECRET: ${JWT_SECRET:-dev-only-not-for-production}
      INTERNAL_S2S_SECRET: ${INTERNAL_S2S_SECRET:-dev-only-not-for-production}
      COMPANIES_SERVICE_URL: http://companies-be:8080
      WORKSPACES_SERVICE_URL: http://workspaces-be:8080
      PORTAL_PUBLIC_URL: http://localhost:3000
      # Local dev: bypass real OTP delivery. Operator login also has an
      # email+password path seeded on first boot.
      DEV_OTP_PEEK: "1"
      DEV_OTP_BYPASS: "1"
      DEV_OTP_BYPASS_CODE: ${DEV_OTP_BYPASS_CODE:-424242}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-10}
      # Optional: real Twilio OTP. Leave blank to keep DEV_OTP_BYPASS.
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VERIFY_SERVICE_SID: ${TWILIO_VERIFY_SERVICE_SID:-}
      # Optional: real email via comms module. Not part of the foundation.
      COMMS_URL: ${COMMS_URL:-}
      COMMS_SHARED_SECRET: ${COMMS_SHARED_SECRET:-}
      # Seed operator overrides (defaults are baked in; override here only
      # if you need a different first-boot operator).
      SEED_OPERATOR_EMAIL: ${SEED_OPERATOR_EMAIL:-operator@sovereign.local}
      SEED_OPERATOR_PASSWORD: ${SEED_OPERATOR_PASSWORD:-sovereign-portal-admin}
      SEED_OPERATOR_PHONE: ${SEED_OPERATOR_PHONE:-+15555550199}
      SEED_OPERATOR_FIRST_NAME: ${SEED_OPERATOR_FIRST_NAME:-Portal}
      SEED_OPERATOR_LAST_NAME: ${SEED_OPERATOR_LAST_NAME:-Operator}
    ports:
      - "4001:8080"

  users-fe:
    build:
      context: ../freshify-users-fe
      dockerfile: Dockerfile
    container_name: portal-users-fe
    restart: unless-stopped
    depends_on:
      - users-be
    environment:
      PORT: 8080
      USERS_SERVICE_URL: http://users-be:8080
      COMPANIES_SERVICE_URL: http://companies-be:8080
      WORKSPACES_SERVICE_URL: http://workspaces-be:8080
      PORTAL_SHELL_URL: http://localhost:3000
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sovereign_session}
    ports:
      - "3001:8080"

  # ---------- foundation: Customers (canonical key: 'companies') module ----------

  companies-be:
    build:
      context: ../freshify-companies
      dockerfile: Dockerfile
    container_name: portal-companies-be
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 8080
      LOG_LEVEL: info
      MONGODB_URI: mongodb://mongo:27017/freshify_companies
      JWT_SECRET: ${JWT_SECRET:-dev-only-not-for-production}
      INTERNAL_S2S_SECRET: ${INTERNAL_S2S_SECRET:-dev-only-not-for-production}
      EVENT_INBOUND_SECRET: ${EVENT_INBOUND_SECRET:-dev-only-not-for-production}
      WORKSPACES_BASE_URL: http://workspaces-be:8080
    ports:
      - "4002:8080"

  companies-fe:
    build:
      context: ../freshify-companies-fe
      dockerfile: Dockerfile
    container_name: portal-companies-fe
    restart: unless-stopped
    depends_on:
      - companies-be
    environment:
      PORT: 8080
      USERS_SERVICE_URL: http://users-be:8080
      COMPANIES_SERVICE_URL: http://companies-be:8080
      WORKSPACES_SERVICE_URL: http://workspaces-be:8080
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sovereign_session}
    ports:
      - "3002:8080"

  # ---------- foundation: Workspaces module ----------

  workspaces-be:
    build:
      context: ../freshify-workspaces
      dockerfile: Dockerfile
    container_name: portal-workspaces-be
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 8080
      LOG_LEVEL: info
      MONGODB_URI: mongodb://mongo:27017/freshify_workspaces
      JWT_SECRET: ${JWT_SECRET:-dev-only-not-for-production}
      INTERNAL_S2S_SECRET: ${INTERNAL_S2S_SECRET:-dev-only-not-for-production}
      EVENT_INBOUND_SECRET: ${EVENT_INBOUND_SECRET:-dev-only-not-for-production}
    ports:
      - "4003:8080"

  workspaces-fe:
    build:
      context: ../freshify-workspaces-fe
      dockerfile: Dockerfile
    container_name: portal-workspaces-fe
    restart: unless-stopped
    depends_on:
      - workspaces-be
    environment:
      PORT: 8080
      USERS_SERVICE_URL: http://users-be:8080
      COMPANIES_SERVICE_URL: http://companies-be:8080
      WORKSPACES_SERVICE_URL: http://workspaces-be:8080
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sovereign_session}
    ports:
      - "3003:8080"

  # ---------- portal shell (host application) ----------

  portal-shell:
    build:
      context: ../freshify-portal-shell
      dockerfile: Dockerfile
    container_name: portal-shell
    restart: unless-stopped
    depends_on:
      - users-be
      - companies-be
      - workspaces-be
    environment:
      PORT: 8080
      USERS_SERVICE_URL: http://users-be:8080
      COMPANIES_SERVICE_URL: http://companies-be:8080
      WORKSPACES_SERVICE_URL: http://workspaces-be:8080
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-sovereign_session}
    ports:
      - "3000:8080"

  # ---------- one-shot seed (runs once on first boot) ----------

  seed:
    image: curlimages/curl:8.10.1
    container_name: portal-seed
    depends_on:
      users-be:
        condition: service_started
    environment:
      INTERNAL_S2S_SECRET: ${INTERNAL_S2S_SECRET:-dev-only-not-for-production}
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for users-be to accept traffic
        for i in $$(seq 1 60); do
          if curl -sf http://users-be:8080/healthz >/dev/null 2>&1; then break; fi
          sleep 2
        done
        echo ""
        echo "────────────────────────────────────────────────────────────"
        echo " Sovereign Portal — bootstrapping operator account"
        echo "────────────────────────────────────────────────────────────"
        OUT=$$(curl -sS -X POST \
          -H "x-internal-secret: $$INTERNAL_S2S_SECRET" \
          -H "content-type: application/json" \
          -d '{}' \
          http://users-be:8080/v1/internal/seed-operator)
        echo "$$OUT"
        echo ""
        echo "────────────────────────────────────────────────────────────"
        echo " Portal is ready: http://localhost:3000"
        echo ""
        echo "   email:    operator@sovereign.local"
        echo "   password: sovereign-portal-admin"
        echo ""
        echo " Or use phone +15555550199 with OTP bypass code 424242."
        echo "────────────────────────────────────────────────────────────"

volumes:
  mongo-data:
    driver: local
